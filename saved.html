<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dyslexic Helper - Saved Files</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
</head>
<body>
  <nav class="sidebar">
    <div class="app-brand">Dyslexic Helper</div>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="upload.html">Upload File</a>
    <a href="paste.html">Paste Text</a>
    <a href="saved.html" class="active">Saved Files</a>
    <a href="write.html">Write</a>
    <button id="change-visuals-button" class="nav-button">Change Visuals 🌈</button>
  </nav>
  <main class="content">
    <header class="page-header">
      <h1>Saved Files</h1>
      <div class="top-bar">
        <button id="title-work-button">Title Work</button>
      </div>
      <div class="user-panel" id="saved-user-panel"></div>
    </header>
    <section class="form-card dyslexic-font">
      <h2>Your saved work</h2>
      <p>Files are ordered from most recent to less recent. Click any download button to save a copy of the file to your computer.</p>
      <div id="saved-files-list"></div>
    </section>
  </main>

  <div id="title-modal" class="title-modal">
    <div class="title-modal-content">
      <h2>Title Your Work</h2>
      <input type="text" id="title-input" placeholder="Enter a title for your work..." maxlength="100">
      <div class="title-modal-buttons">
        <button id="title-save-button">Save Title</button>
        <button id="title-cancel-button">Cancel</button>
      </div>
      <div id="title-status"></div>
    </div>
  </div>

  <div id="change-visuals-modal" class="change-visuals-modal">
    <div class="change-visuals-content">
      <h2>Change Visuals 🌈</h2>
      <div class="visuals-grid">
        <label>Font
          <select id="visual-font-select">
            <option value="Arial">Arial</option>
            <option value="Tahoma">Tahoma</option>
            <option value="Verdana">Verdana</option>
            <option value="'Trebuchet MS'">Trebuchet MS</option>
            <option value="Helvetica">Helvetica</option>
            <option value="Roboto">Roboto</option>
            <option value="'Open Sans'">Open Sans</option>
          </select>
        </label>
        <label>Letter spacing
          <div class="visuals-row"><input type="range" id="visual-letter-spacing" min="0" max="0.4" step="0.01"><span id="letter-spacing-value"></span></div>
        </label>
        <label>Word spacing
          <div class="visuals-row"><input type="range" id="visual-word-spacing" min="0" max="0.4" step="0.01"><span id="word-spacing-value"></span></div>
        </label>
        <label>Background color
          <input type="color" id="visual-bg-color" value="#f7f4ef">
        </label>
        <label>Text color
          <input type="color" id="visual-text-color" value="#1f1f1f">
        </label>
        <label>Accent color
          <input type="color" id="visual-accent-color" value="#418383">
        </label>
      </div>
      <div class="title-modal-buttons">
        <button id="visual-save-button">Save visuals</button>
        <button id="visual-cancel-button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="edit-file-modal" class="edit-file-modal">
    <div class="edit-file-modal-content">
      <h2>Edit saved file</h2>
      <input type="text" id="edit-file-title" placeholder="Edit file title..." maxlength="100">
      <textarea id="edit-file-content" rows="12" placeholder="Edit your saved text..."></textarea>
      <div class="title-modal-buttons">
        <button id="edit-file-save-button">Save changes</button>
        <button id="edit-file-cancel-button">Cancel</button>
      </div>
      <div id="edit-file-status"></div>
    </div>
  </div>
